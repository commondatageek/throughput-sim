version: "3"

tasks:
  generate:
    desc: Generate issues.json in the project root
    cmd: python generate-issues/main.py > issues.json

  build:
    desc: Build all Go commands to bin/
    cmds:
      - go build -C cmd/aging-report -o ../bin/aging-report .
      - go build -C cmd/linear-fetch -o ../bin/linear-fetch .
      - go build -C cmd/sim -o ../bin/sim .
      - go build -C cmd/sync -o ../bin/sync .

  fetch:
    desc: Fetch completed issues from Linear and persist to items.db (requires LINEAR_API_KEY)
    cmd: ./bin/sync -source linear -db items.db
