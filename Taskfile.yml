version: "3"

tasks:
  build:
    desc: Build all Go commands to bin/
    cmds:
      - go build -C cmd/aging-report -o ../../bin/aging-report .
      - go build -C cmd/sim -o ../../bin/sim .
      - go build -C cmd/sync -o ../../bin/sync .

  fetch:
    desc: Fetch completed issues from Linear and persist to linear.db (requires LINEAR_API_KEY)
    cmd: ./bin/sync -db linear.db

  test:
    desc: Run all Go tests
    cmd: go test ./...
